<ion-content class="login-content" scroll-y="false">
  <div class="gradient-bg">
    <div class="header">
      <img src="assets/images/logo.png" alt="Logo" class="logo" />
    </div>

    <div class="card slide-up">
      <div class="input-container">
        <ion-icon name="mail-outline" color="medium"></ion-icon>
        <input type="email" class="custom-input" placeholder="SafeStep@gmail.com" [(ngModel)]="correo" />
        <ion-icon name="checkmark-circle-outline" style="color: #0E9AA7;"></ion-icon>
      </div>

      <div class="input-container">
        <ion-icon name="lock-closed-outline" color="medium"></ion-icon>
        <input [type]="mostrarContrasena ? 'text' : 'password'" class="custom-input" placeholder="Contrasena" [(ngModel)]="contrasena" />
        <ion-icon [name]="mostrarContrasena ? 'eye-off-outline' : 'eye-outline'" color="medium" (click)="toggleContrasena()"></ion-icon>
      </div>

      <div class="row-options">
        <div class="remember-container">
          <div class="checkbox"></div>
          <span class="remember-text">Recuerdame</span>
        </div>
        <span class="forgot-text">Olvide mi contrasena</span>
      </div>

      <button class="btn-primary" (click)="manejarInicioSesion()" [disabled]="iniciandoSesion">
        {{ iniciandoSesion ? 'Ingresando...' : 'Ingresar' }}
      </button>

      <div class="social-container">
        <ion-icon name="logo-apple" class="social-icon"></ion-icon>
        <ion-icon name="logo-google" class="social-icon google-color"></ion-icon>
        <ion-icon name="logo-facebook" class="social-icon facebook-color"></ion-icon>
      </div>

      <p class="register-text">
        No tienes cuenta? <span class="register-link" routerLink="/crear-cuenta">Registrate aqui</span>
      </p>
    </div>
  </div>
</ion-content>
